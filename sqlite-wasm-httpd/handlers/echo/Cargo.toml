[package]
name = "wasm-echo-handler"
version = "0.1.0"
edition = "2021"
publish = false
description = "Smoke fixture for sqlite-wasm-httpd's wasm route dispatch  echoes the request as the response body."

# Standalone workspace: parent workspace builds for native; this
# crate builds for wasm32-wasip2 only.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
