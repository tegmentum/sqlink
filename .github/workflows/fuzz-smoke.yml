name: fuzz-smoke

on:
  pull_request:
    paths:
      - '**.rs'
      - 'fuzz/**'
      - '.github/workflows/fuzz-smoke.yml'
  workflow_dispatch: {}

concurrency:
  group: fuzz-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    # Shared time-bounded cargo-fuzz smoke matrix (Tier 4 reusable workflow).
    uses: tegmentum/datalink/.github/workflows/fuzz.yml@main
    with:
      targets: >-
        ["policy_check_manifest", "cas_put_bytes_roundtrip", "bundle_save_set_hash",
         "parse_duration", "parse_load_args", "spawn_build_path_validation",
         "bundle_cli_argv", "sqlink_cli_argv"]
      fuzz_dir: fuzz
      max_total_time: '300'
      cache_key: fuzz-smoke-v1
