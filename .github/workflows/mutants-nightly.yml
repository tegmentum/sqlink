name: mutants-nightly

on:
  schedule:
    # Mon-Fri 07:00 UTC. Single-crate matrix budget per night so
    # the workflow finishes in a few hours per crate.
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: mutants-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutate:
    # Shared nightly cargo-mutants matrix (Tier 4 reusable workflow).
    uses: tegmentum/datalink/.github/workflows/mutants.yml@main
    with:
      crates: '["sqlite-cas-cache", "sqlite-extension-policy"]'
      jobs: '1'
      timeout_minutes: 360
