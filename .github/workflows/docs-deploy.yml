name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/plans/**'
      - '.github/workflows/docs-deploy.yml'
  # Manual trigger from the Actions UI.
  workflow_dispatch:

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  docs:
    # Shared Docusaurus build + gh-pages push (Tier 4 reusable workflow).
    # pre_build_run mirrors docs/plans/ into the website's plans/ category
    # (sync rather than symlink so the runner sees real files at build time +
    # commits the synced state into gh-pages).
    uses: tegmentum/datalink/.github/workflows/docs-deploy.yml@main
    with:
      website_dir: website
      node_version: '20'
      pre_build_run: |
        mkdir -p website/docs/plans
        cp -f docs/plans/PLAN-*.md website/docs/plans/
    secrets: inherit
