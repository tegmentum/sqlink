name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/plans/**'
      - '.github/workflows/docs-deploy.yml'
  # Manual trigger from the Actions UI.
  workflow_dispatch:

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build Docusaurus + push to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # No submodules needed; the docs build reads only
          # website/ and docs/plans/.
          submodules: false

      - name: Sync PLAN docs into website
        # The website's plans/ category mirrors docs/plans/. Sync
        # rather than symlink so the workflow runner sees real
        # files at build time + commits the synced state into
        # the gh-pages branch.
        run: |
          mkdir -p website/docs/plans
          cp -f docs/plans/PLAN-*.md website/docs/plans/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          # First-deploy note: after this workflow's first
          # successful run, set Settings  Pages  Source =
          # gh-pages branch in the repo settings. Subsequent
          # runs auto-deploy without intervention.
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'docs: deploy ${{ github.sha }}'
