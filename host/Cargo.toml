[package]
name = "sqlink-host"
version = "0.1.0"
edition = "2021"
description = "Reference wasmtime-based host for SQLite-in-WebAssembly components. Implements sqlink:wasm/extension-loader using the unified sqlite:extension contract."
license = "MIT"

[[bin]]
name = "sqlink"
path = "src/main.rs"

[lib]
name = "sqlink_host"
path = "src/lib.rs"

[dependencies]
# Canonical Policy / Capability / HttpPolicy / PolicyError types,
# shared with sqlink-loader/runtimes/{wasmtime,wamr}.
sqlite-extension-policy = { path = "../sqlite-loader-wit" }

# Pure-fn parsers + spawn-build validators. Extracted so fuzz
# harnesses can import the source-of-truth without the host's
# tokio/wasmtime dep graph.
sqlink-parsers = { path = "../sqlink-parsers" }

# Shared runtime WIT contract-version load guard (also consumed by the
# ducklink host). Introspects a loaded component's imported sqlite:extension
# @MAJOR and rejects a contract-major mismatch (or unversioned/legacy)
# before instantiation -- silent-corruption protection. datalink is PUBLIC.
datalink-contract = { git = "https://github.com/tegmentum/datalink.git" }

# Shared compose:dynlink linker host (also consumed by the ducklink host).
# We use its ADDITIVE async flavor: AsyncProviderBackend + AsyncDynLinkBridge
# + impl_datalink_dynlink_async_host! + add_to_linker_async, with the instance
# resource table kept in our per-Store state. sqlink's trust gate, CAS-digest
# resolution, multi-tenancy, the fresh-store WasmComponent path, and the
# built-in SqliteRuntime shim live in our AsyncProviderBackend impls; the
# bridge routes resolve/invoke/drop to them. datalink is PUBLIC.
datalink-dynlink = { git = "https://github.com/tegmentum/datalink.git" }

# Shared, db-agnostic function-prefix namespacing (also consumed by the
# ducklink host). The prefix__name resolution algorithm + the collision/pin
# model behind a PrefixStore trait; this host backs that trait with its
# __sqlink_prefix* SQLite tables (see prefix_registry.rs). datalink is PUBLIC.
datalink-prefix = { git = "https://github.com/tegmentum/datalink.git" }

anyhow = "1.0"
wasmtime = { version = "46.0.1", features = [
    "component-model",
    "component-model-async",
    "cranelift",
    "parallel-compilation",
    "async",
    # On-disk compilation cache. Wasmtime hashes each module + the
    # compiler config and stores the compiled artifact under the
    # configured directory; subsequent `Engine::precompile_component`
    # / `Component::new` calls hit the cache. See Host::new for the
    # directory wiring (env `SQLITE_WASM_COMPILE_CACHE` or default
    # `~/.cache/sqlink/compile-cache`).
    "cache",
] }
wasmtime-wasi = "46.0.1"
# Standard wasi:http surface for loaded extensions that compose with
# upstream wasi:http components (e.g. tiger-geocoder-sqlink-bridge,
# which inlines the Census REST geocoder via wasi:http/outgoing-handler).
# Distinct from the host's custom `sqlite:extension/http` interface —
# that one is reqwest-backed and gated by `Capability::Http` + the
# per-extension http-policy; this surface satisfies the standardised
# `wasi:http/{types,outgoing-handler}` imports a guest may inherit
# transitively from a composed upstream component. Version must match
# the `wasmtime` crate version exactly. (#683)
wasmtime-wasi-http = "46.0.1"
parking_lot = "0.12"
tracing = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-std", "io-util", "fs", "time"] }
async-trait = "0.1"
# Real http impl for the http-resolver component path. blocking to
# stay sync within the (currently sync) Host trait method body —
# the parent async call already yielded, so blocking briefly here
# is OK for v1; future revision uses async reqwest with proper
# cooperative scheduling.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"] }
# AWS SigV4 signing for the s3-base::Host dispatcher. Used in
# concert with reqwest to talk to S3 / MinIO / Cloudflare R2 /
# any S3-compatible endpoint extensions point at. Substrate for
# PLAN-wal-archive-extension.md (#440)  the wal-archive
# extension's primary off-box sink.
#
# We use the in-host (aws-sigv4 + reqwest) strategy rather than
# composing the s3-wasm component into wasmtime because (a) the
# s3-wasm component imports wasi:http/outgoing-handler which would
# require wasmtime-wasi-http + an additional aws-sigv4 component
# instance, and (b) the WIT contract is mirrored exactly so a
# future iteration can swap implementations without touching the
# extension-facing surface.
aws-sigv4 = "1.4"
# Required by aws-sigv4 to construct the in-host credential
# identity (access-key + secret + optional session-token).
aws-credential-types = "1"
hex = "0.4"
url = "2"
# Async DNS resolver used by the host's `dns::resolve` impl for
# `Capability::Dns`-granted extensions. Same async story as reqwest;
# the Host trait method is already async, so we just `.await` it.
hickory-resolver = { version = "0.24", default-features = false, features = ["tokio-runtime", "system-config"] }
# Host-side SQLite for the hybrid SPI path + sqlite-runtime
# compose provider. Same sqlite3.c the wasm crates use — we drive
# it through `core::db` (in-tree libsqlite3-sys wrapper) so the
# host and the wasm components share one SQLite story end to end.
# Used to be `rusqlite`; dropped because (a) the host had two
# SQLite stacks and (b) every type swap was paid twice.
sqlite-component-core = { path = "../sqlite-wasm/core" }
# Direct dep so the sqlink-run binary can call the
# session/changeset FFI for its `changeset` subcommand. The
# bundled sqlite3 is compiled with SESSION via LIBSQLITE3_FLAGS
# (.cargo/config.toml); we declare sqlite3session_* / sqlite3changeset_*
# as extern "C" manually because the libsqlite3-sys `session`
# feature forces buildtime_bindgen which fails on wasm32-wasip2
# cross-compile.
libsqlite3-sys = { version = "0.38", default-features = false }
# SQLite-backed content-addressed cache for resolved extension
# components. The host's `cache` module is a thin wrapper. The
# `compose` feature lights up `SqliteCasStore: compose_core::blobs::
# BlobBackend` (sha-256 addressing) so the store plugs into the shared
# `CompileCache` exactly like the framework's `FsBlobStore`.
sqlite-cas-cache = { path = "../sqlite-cas-cache", features = ["compose"] }
# Single shared CAS trait + trust-gated `CompileCache` (HMAC seal/open
# bound to the engine identity). The precompiled-component cache
# authenticates its artifacts through this — the same trust model
# ducklink uses for its `.cwasm` files. Wasmtime-free + sqlite-free.
compose-core = { git = "https://github.com/tegmentum/webassembly-component-orchestration.git", branch = "main" }
# Hash primitive  shared with sqlite-cas-cache so hex decoders
# in this crate don't need to round-trip through the store.
blake3 = "1.5"
tempfile = "3.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# CBOR codec for the sqlite-runtime compose provider — see
# host/COMPOSE-PROTOCOL.md for the wire shape.
ciborium = "0.2"
# TVM-track host wiring. As of Stage 5f the cli component itself
# is a pure SPI client (no SQLite, no tvm:memory imports). The
# tvm:memory wiring is still needed because (a) the composed
# `cli + sqlite-lib` runnable used in scenario-2 smoke imports
# tvm:memory via sqlite-lib's sqlite-pcache-tvm + sqlite-vfs-tvm,
# and (b) the host's TVM probe tests (host/tests/tvm_*) instantiate
# small components that exercise the tvm:memory contract directly.
# The host's make_run_linker + the main.rs cli runner both wire
# tvm_wasmtime::add_to_linker so those imports resolve. Sourced via a
# pinned git rev of tvm-wasm (not the submodule path) so that ChimeraDB's
# in-process build can link sqlink-host + ducklink-host against a SINGLE
# tvm-core source (both pin the same rev). See chimeradb/PLAN-inprocess.md PR1.
tvm-wasmtime = { git = "https://github.com/tegmentum/tvm-wasm.git", rev = "6f3bae38fad4addd4de1837ab151f4ac871d1dd4" }

# PLAN-cli-stages-5-6.md Stage 5c: embedded SQL function extensions
# moved from cli/Cargo.toml. Each is an optional dep + a feature
# flag; the host's register_embedded_extensions wires whichever
# are enabled at compile time. Starting with the most common ones
# (sha3, uuid, regexp, json1) as proof of concept; the remaining
# 85 follow in subsequent commits.
sha3-extension   = { path = "../extensions/sha3",   optional = true, features = ["embed"], default-features = false }
