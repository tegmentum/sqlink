[package]
name = "session-cli-extension"
version = "0.1.0"
edition = "2021"
description = """
`.session` as a wasm dot-command extension.

PLAN-cli-stages-5-6.md Stage 6: the cli's old CLI_CONN-based
.session was a no-op after Stage 3c (sessions captured CLI_CONN
changes, but eval_sql ran against the host's shared connection).
Sessions now live host-side in a named handle map (see Host's
`session_handles`); this extension is the dotcmd front-end that
calls the new `spi.session-*` host imports.
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
