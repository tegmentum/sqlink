[package]
name = "web-mercator-tile-extension"
version = "0.1.0"
edition = "2021"
description = """
Web Mercator tile coords (xyz, quadkey)
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# add your upstream crate deps here
