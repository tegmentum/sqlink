[package]
name = "csscolor-extension"
version = "0.1.0"
edition = "2021"
description = """
CSS-conformant color parsing via `csscolorparser` 0.8.
Handles the full Web Colors set: hex, rgb()/rgba(),
hsl()/hsla(), hwb(), lab(), oklch(), named colors
(X11 + CSS4), `transparent`.

    color_name(css)          TEXT     "red" / NULL if not a named color
    color_red(css)           INTEGER  0..255
    color_green(css)         INTEGER  0..255
    color_blue(css)          INTEGER  0..255
    color_alpha(css)         REAL     0..1

Note: the canonical color extension owns color_to_hex /
color_to_rgb / color_parse / rgb_to_hsl. This crate keeps
only the CSS-string-accepting channel extractors plus the
reverse hex->name lookup that `color` does not provide.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile csscolor's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off. See PLAN-embed-extensions.md.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
csscolorparser = { version = "0.8", default-features = false, features = [
    "named-colors",
] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
