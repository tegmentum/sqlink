[package]
name = "jsonpath-extension"
version = "0.1.0"
edition = "2021"
description = """
JSONPath (RFC 9535) query over a JSON document. Pairs
with the bundled json1 extension:

    json_extract(doc, '$.a.b.c')   -- json1, simple paths only
    jsonpath(doc, '$..price')       -- this ext, full RFC 9535

Scalars:

    jsonpath(doc, path)        -- TEXT (JSON array of matches)
    jsonpath_first(doc, path)  -- TEXT (first match as JSON, or NULL)
    jsonpath_count(doc, path)  -- INTEGER (#matches)
    jsonpath_exists(doc, path) -- INTEGER (1 if any match)

Supports recursive descent `..`, wildcards `*`, slices
`[start:end:step]`, filters `[?@.price < 10]`, and the
function-extension set in RFC 9535 (`length()`, `count()`,
`match()`, `search()`, `value()`).

Uses `serde_json_path` 0.7  the RFC 9535-conforming
Rust impl, much smaller than jsonpath-rust 1.0 (which
pulls in regex + sync_lru).
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = "1"
serde_json_path = "0.7"
