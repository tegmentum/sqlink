[package]
name = "mailto-extension"
version = "0.1.0"
edition = "2021"
description = """
mailto: URI parser  decompose into recipient + subject + body
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# default-features = false works; idna transitively brought in
url = "2.5"
serde_json = "1"
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
