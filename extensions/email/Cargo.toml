[package]
name = "email-extension"
version = "0.1.0"
edition = "2021"
description = """
Email address validation + decomposition via the
`email_address` crate (RFC 5321 / 5322 conformant).

    email_validate(addr)    INTEGER  1 if valid, 0 if not
    email_local(addr)       TEXT     "alice" from "alice@example.com"
    email_domain(addr)      TEXT     "example.com" from same
    email_normalize(addr)   TEXT     lowercased + trimmed,
                                       or NULL on invalid

Use cases:
  * Pre-flight check on user-submitted addresses
  * Group rows by `email_domain()` for "users per
    company" analytics
  * Generate a `normalized_email` column for unique-
    constraint friendliness
  * Pair with `dns_resolve` for MX-record validation:
        SELECT email_validate(e)
           AND dns_resolve(email_domain(e), 'MX') != '[]'
        AS deliverable FROM contacts;
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile email's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
email_address = { version = "0.2", default-features = false }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
