[package]
name = "crypto-keys-extension"
version = "0.1.0"
edition = "2021"
description = """
Key-based crypto: ed25519 sign/verify, x25519 ECDH, AEAD
ciphers (ChaCha20-Poly1305 + AES-GCM), and merkle-tree
helpers. Complements crypto-auth (which does passwords +
JWT).

Functions:
  ed25519_keygen()              BLOB  32-byte seed
  ed25519_public(secret)        BLOB  32-byte public key
  ed25519_sign(secret, msg)     BLOB  64-byte signature
  ed25519_verify(pub, sig, msg) INTEGER 0/1
  x25519_keygen()               BLOB
  x25519_public(secret)         BLOB
  x25519_shared(mine, theirs)   BLOB  32-byte shared secret
  chacha20poly1305_encrypt(key, nonce, ad, plaintext)  BLOB
  chacha20poly1305_decrypt(key, nonce, ad, ciphertext) BLOB
  aes_gcm_encrypt(key, nonce, ad, plaintext)  BLOB
  aes_gcm_decrypt(key, nonce, ad, ciphertext) BLOB
  merkle_root(leaves_blob)      BLOB  sha-256
  merkle_proof_verify(root, leaf, proof) INTEGER

Tier-3 cluster per PLAN-extensions-batch-2 Phase F3.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
ed25519-dalek = "2"
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
aes-gcm = "0.10"
sha2 = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
getrandom = "0.2"
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
