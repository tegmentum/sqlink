[package]
name = "parsers-extension"
version = "0.1.0"
edition = "2021"
description = """
Small parsers and converters. All hand-rolled  no external
deps, fast wasm build, small artifact.

Functions:
  rgb_to_hex(r, g, b)              TEXT  '#rrggbb'
  rgb_to_hsl(r, g, b)              TEXT  'h,s,l'

  luhn_check(n)                    INTEGER 0/1

Color: hex_to_rgb / hsl_to_rgb / color_lighten / color_darken
       have been moved to extensions/color.
Unit conversion: convert_length / convert_mass / convert_temperature
       have been moved to extensions/unitconv.
IBAN: iban_validate / iban_format have been moved to extensions/iban.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
