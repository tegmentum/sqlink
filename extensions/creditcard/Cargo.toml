[package]
name = "creditcard-extension"
version = "0.1.0"
edition = "2021"
description = """
Credit card BIN-range type detection (Visa/MC/Amex/Discover/JCB/UnionPay) + masking
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-wasm/sqlite-embed", optional = true }
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore's
# sqlite_shim! / embed_shim! macros.
creditcard-core = { path = "../../../datalink/extensions/creditcard-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }
