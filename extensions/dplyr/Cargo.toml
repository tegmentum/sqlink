[package]
name = "dplyr-extension"
version = "0.1.0"
edition = "2021"
description = """
dplyr parser extension (sqlite:extension port).

SQLite's amalgamation parser is not extensible, so dplyr rides the host
shell's parse-failure intercept: it declares the reserved scalar
`__sqlink_parse(query) -> text` (the parser entrypoint). On a built-in
syntax error the host offers the failed statement to this scalar; a
`dplyr( tbl |> filter(..) |> select(..) |> .. )` statement is transpiled
to ordinary SQL (filter/select/mutate/arrange/summarise/group_by),
anything else returns NULL (declined).
"""
license = "MIT"
publish = false

# Standalone workspace (like the other scaffolded extensions): kept OUT
# of the sqlink root workspace so `make ext NAME=dplyr` builds just this
# component. The datalink core path-deps resolve fine.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# Shared, DB-agnostic dplyr->SQL transpiler + the parser-entry capability
# declaration (datalink pull-up). This shim is GENERATED from the core by
# datalink-extcore's sqlite_shim! — the same scalar codegen the rest of
# the catalog uses; no bespoke parser glue.
dplyr-core = { path = "../../../datalink/extensions/dplyr-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }
