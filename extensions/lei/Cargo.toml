[package]
name = "lei-extension"
version = "0.1.0"
edition = "2021"
description = """
LEI ISO 17442 Legal Entity Identifier validation (mod-97 / ISO 7064)
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# add your upstream crate deps here
