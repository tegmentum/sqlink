[package]
name = "sketches-extension"
version = "0.1.0"
edition = "2021"
description = """
Deeper streaming sketches: t-digest (quantile estimation
better than count_min for percentiles) and MinHash (Jaccard
similarity).

Aggregates:
  t_digest(value, [compression])  STATE (BLOB)
  minhash(value, [k])             STATE (BLOB; k=64 default)

Scalars:
  t_digest_quantile(state, q)     REAL
  t_digest_count(state)           INTEGER
  minhash_jaccard(a, b)           REAL  Jaccard similarity
  sketches_version()              TEXT

Pure-Rust hand-rolled implementations  no external sketch
crate dependency. Pairs with the existing hyperloglog +
count_min + bloom extensions.
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
twox-hash = { version = "1", default-features = false }
