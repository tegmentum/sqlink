[package]
name = "fileio-extension"
version = "0.1.0"
edition = "2021"
description = """
Filesystem helpers. Port of SQLite's ext/misc/fileio.c surface
plus a few stat-flavored extras.

Functions:
  readfile(path)           BLOB    full file contents
  writefile(path, blob)    INTEGER bytes written
  appendfile(path, blob)   INTEGER bytes appended
  file_exists(path)        INTEGER 0/1
  file_size(path)          INTEGER bytes
  file_is_dir(path)        INTEGER 0/1
  fileio_version()         TEXT

Filesystem access flows through WASI's preopen surface  the
host preopens `.` (cwd) and `/` with full DirPerms / FilePerms
on the loaded-extension Store. The capability variant in
sqlite:extension/policy doesn't yet have a `fs` flag; once it
does, gate this extension's manifest with declared_capabilities
to make the permission model explicit.

Tier-3 capability-gated per PLAN-extensions-followups Phase E8.
"""
license = "MIT"
publish = false

# NOTE: [workspace] removed so the cli's embed-fileio path dep can
# reach this crate from the parent workspace; same pattern as
# sha3-extension / crc-extension. `make ext NAME=fileio` still builds
# the wasi component fine. See PLAN-embed-extensions.md.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile fileio's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-wasm/sqlite-embed", optional = true }
