[package]
name = "latlon-extension"
version = "0.1.0"
edition = "2021"
description = """
Lat/lon format conversion: decimal, DMS, DDM
"""
license = "MIT"
publish = false


[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# add your upstream crate deps here

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies.libsqlite3-sys]
version = "0.38"
optional = true
default-features = false

[dependencies.sqlite-embed]
path = "../../sqlite-wasm/sqlite-embed"
optional = true
