[package]
name = "formats-extension"
version = "0.1.0"
edition = "2021"
description = """
Lighter data-format codecs bundled together: INI and XML/XPath.
Bigger formats (Arrow, Parquet, Excel, Avro) get their own
extensions because their crates pull substantial deps. TOML
codecs live in extensions/toml.

Functions:
  ini_to_json(text)             TEXT
  json_to_ini(text)             TEXT
  xml_extract(doc, xpath_lite)  TEXT  concatenated matched text
  xml_to_json(doc)              TEXT  basic XMLJSON shape
  xml_attr(doc, xpath, attr)    TEXT  attribute of first match
"""
license = "MIT"
publish = false

# Standalone workspace so cargo doesn't try to resolve the parent
# repo's workspace (which transitively references other extensions
# that may be in flux during refactors).
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
quick-xml = { version = "0.36", features = ["serialize"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-wasm/sqlite-embed", optional = true }
