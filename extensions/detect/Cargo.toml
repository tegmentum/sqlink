[package]
name = "detect-extension"
version = "0.1.0"
edition = "2021"
description = """
Small detection / canonicalization scalar pack:

    slug(text)             -- TEXT  URL-safe slug
    lang_detect(text)      -- TEXT  ISO 639-3 lang code or NULL
    lang_confidence(text)  -- REAL  detector confidence (0..1)
    mime_detect(blob)      -- TEXT  MIME type or NULL
    mime_extension(blob)   -- TEXT  canonical file extension or NULL

Three small crates, each lean: `slug` (unicode  ascii
slug), `whatlang` (n-gram lang ID, 69 languages), `infer`
(file-magic MIME sniffer, no_std). Pair with `fileio` /
`zipfile` for "read a blob from disk, identify the type,
slug the title".
"""
license = "MIT"
publish = false

# NOTE: [workspace] removed so the cli's embed-detect path dep can
# reach this crate from the parent workspace; same pattern as
# sha3-extension. `make ext NAME=detect` still builds the wasi
# component fine. See PLAN-embed-extensions.md.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile detect's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
slug = "0.1"
whatlang = "0.18"
infer = { version = "0.19", default-features = false }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
