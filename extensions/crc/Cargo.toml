[package]
name = "crc-extension"
version = "0.1.0"
edition = "2021"
description = """
CRC-32 / CRC-64 / CRC-16 checksums (multiple polynomials)
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
crc = "*"
