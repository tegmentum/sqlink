[package]
name = "faker-extension"
version = "0.1.0"
edition = "2021"
description = """
Generate fake test data (names, emails, addresses, etc.) via the fake crate
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
fake = "*"
