[package]
name = "bloom-extension"
version = "0.1.0"
edition = "2021"
description = """
Bloom filter scalars. Sized at create time by (n, fp_rate);
two independent hash functions derived from one 128-bit
xxhash via output splitting.

Functions:
  bloom_create(n_items, fp_rate)        BLOB   filter sized for the targets
  bloom_add(filter, value)              BLOB   new filter w/ value inserted
  bloom_might_contain(filter, value)    INTEGER 0/1
  bloom_count(filter)                   INTEGER number of insertions seen
  bloom_size_bits(filter)               INTEGER m (capacity)

Wire format (per filter BLOB):
  bytes 0-3   m_bits (u32 LE)
  bytes 4-7   k_hashes (u32 LE)
  bytes 8-15  n_added (u64 LE)
  bytes 16+   bit array (m_bits/8 bytes, rounded up)

Tier-1 sketch per PLAN-extensions-followups Phase E1.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
twox-hash = { version = "1", default-features = false }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
