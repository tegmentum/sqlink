[package]
name = "vin-extension"
version = "0.1.0"
edition = "2021"
description = """
VIN (Vehicle Identification Number) ISO 3779 validation + decomposition
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# add your upstream crate deps here
