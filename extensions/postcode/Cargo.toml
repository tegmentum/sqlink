[package]
name = "postcode-extension"
version = "0.1.0"
edition = "2021"
description = """
Multi-country postal code validation (US ZIP, UK, CA, DE, FR, JP)
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
regex = "*"
