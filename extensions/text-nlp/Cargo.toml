[package]
name = "text-nlp-extension"
version = "0.1.0"
edition = "2021"
description = """
Deeper text / NLP helpers. Complements text-utils
(sql_normalize + prefixes) and spellfix1 (Levenshtein).

Functions:
  text_diff(a, b)          TEXT  unified-style diff
  text_diff_added(a, b)    TEXT  JSON array of added lines
  text_diff_removed(a, b)  TEXT  JSON array of removed lines
  text_diff_summary(a, b)  TEXT  JSON {added:N, removed:N}
  text_similarity(a, b)    REAL  Ratcliff/Obershelp ratio
  markdown_to_html(md)     TEXT  CommonMark
  stem_porter(word)        TEXT  Porter stemmer (English)
  soundex(word)            TEXT  4-char phonetic key
  metaphone(word)          TEXT  primary metaphone code
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
similar = { version = "2", default-features = false, features = ["text"] }
pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
rust-stemmers = "1"
serde_json = "1"
htmd = { version = "0.5", default-features = false }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
