[package]
name = "isin-extension"
version = "0.1.0"
edition = "2021"
description = """
ISIN (International Securities Identification Number) ISO 6166 validation
"""
license = "MIT"
publish = false

# NOTE: [workspace] removed so the cli's embed-isin path dep can
# reach this crate from the parent workspace. `make ext NAME=isin`
# still builds the wasi component fine. See PLAN-embed-extensions.md.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile isin's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# add your upstream crate deps here
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
