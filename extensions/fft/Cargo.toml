[package]
name = "fft-extension"
version = "0.1.0"
edition = "2021"
description = """
Fast Fourier Transform extension for SQLite: forward + inverse
transforms over JSON arrays, plus magnitude / phase / power-spectrum
helpers and the standard window functions (hann / hamming / blackman
/ rect). Pairs with the existing `time-series` extension to give
SQL a frequency-domain surface: pull samples from a column, FFT,
read peak bins, all in one query.

Function surface (PLAN-more-extensions-4.md  5):

  fft_forward(samples_json)         -> text  (JSON [[re, im], ...])
  fft_forward_real(samples_json)    -> text  (real input  complex output)
  fft_inverse(spectrum_json)        -> text  (JSON real-valued time-domain)
  fft_magnitude(spectrum_json)      -> text  (JSON array of |X[k]|)
  fft_phase(spectrum_json)          -> text  (JSON array of phases, rad)
  fft_power_spectrum(samples_json)  -> text  (JSON array of |X[k]|²)
  fft_window(samples_json, kind)    -> text  (apply window; kinds:
                                              hann/hamming/blackman/rect)
  fft_version()                     -> text

Inputs are JSON arrays (TEXT). Real-valued arrays accept any
numeric element; complex arrays use [re, im] pairs. Power-of-2
lengths are fastest; arbitrary lengths are supported because
rustfft picks mixed-radix or Bluestein automatically.

NULL or non-JSON input  NULL; malformed elements  NULL.
"""
license = "MIT"
publish = false

# Standalone workspace per project rules: keeps the parent
# workspace from trying to build this crate natively.
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# Pure-rust FFT  Cooley-Tukey for power-of-2 lengths and
# mixed-radix / Bluestein for arbitrary lengths. The de-facto
# choice for FFT in the rust ecosystem.
rustfft = { version = "6", default-features = false }
# JSON in/out for sample arrays + complex pairs.
serde_json = { version = "1", default-features = false, features = ["alloc"] }
