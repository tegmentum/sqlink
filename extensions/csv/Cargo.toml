[package]
name = "csv-extension"
version = "0.1.0"
edition = "2021"
description = """
Port of SQLite's csv vtab as a wasm32-wasip2 component. Read-only
v1: every column comes back as TEXT, no type sniffing, no
header-detection knobs beyond a "header" arg. Targets the
`sqlite:extension/tabular` world.

CREATE VIRTUAL TABLE call shape:

    CREATE VIRTUAL TABLE rows USING csv(
        filename=/path/to/file.csv,
        header=true,
        schema='CREATE TABLE x(a TEXT, b TEXT)'
    );

Either `header=true` or an explicit `schema=...` is required so
the vtab can name its columns. The `filename` arg is required.

Reference port for PLAN-sqlite-plugins.md tier 3. Smallest scope
that exercises every callback in the vtab interface end-to-end.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
