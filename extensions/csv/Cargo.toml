[package]
name = "csv-extension"
version = "0.1.0"
edition = "2021"
description = """
Port of SQLite's csv vtab as a wasm32-wasip2 component.

WIT path: read-only. Every column comes back as TEXT, no type
sniffing, no header-detection knobs beyond a `header` arg.

Embed path (feature = embed): READ + WRITE. INSERT / UPDATE /
DELETE buffer in memory; xCommit writes the file atomically
(temp + rename); xRollback re-reads the original file. Auto-
commit (single statement with no explicit BEGIN) works the same
way — sqlite drives xBegin / xUpdate / xCommit around each.

CREATE VIRTUAL TABLE call shape:

    CREATE VIRTUAL TABLE rows USING csv(
        filename=/path/to/file.csv,
        header=true,
        schema='CREATE TABLE x(a TEXT, b TEXT)'
    );

Either `header=true` or an explicit `schema=...` is required so
the vtab can name its columns. The `filename` arg is required.

Reference port for PLAN-sqlite-plugins.md tier 3. The embed
path is also the first non-toy consumer of the vtab-mutating
v2 contract (xUpdate + xBegin/xCommit/xRollback).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
