[package]
name = "web-parsers-extension"
version = "0.1.0"
edition = "2021"
description = """
Web-data parsers  JSONPath + HTML CSS selection. Bundled into
one extension because the SQL surface is parallel (extract a
value from a structured-text BLOB / TEXT).

Functions:
  jsonpath(doc, expr)        TEXT      JSON array of matches
  jsonpath_first(doc, expr)  TEXT      first match (or NULL)
  jsonpath_exists(doc, expr) INTEGER   0/1
  html_extract(doc, sel)     TEXT      concatenated text of all
                                         matching nodes
  html_extract_all(doc, sel) TEXT      JSON array of node texts
  html_attr(doc, sel, name)  TEXT      attribute of first match
  html_text(doc)             TEXT      plain text of <body>

Tier-2 parsers per PLAN-extensions-followups Phase E7. The
html5ever transitive dep adds ~400 KB to the wasm bundle
acceptable tradeoff for full HTML5 parsing.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
# JSONPath: serde_json_path is the actively-maintained crate
# and tracks RFC 9535. jsonpath_lib is older but smaller.
serde_json_path = "0.7"
# HTML5 parsing + CSS selection.
scraper = { version = "0.21", default-features = false }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-wasm/sqlite-embed", optional = true }
