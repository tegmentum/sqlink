[package]
name = "db-utils-extension"
version = "0.1.0"
edition = "2021"
description = """
Database introspection helpers over the spi.execute import.
All scalars query the host db via spi; works only with a
file-backed db (--db PATH on sqlite-wasm-run).

Functions:
  schema_tables()             TEXT  JSON array of table names
  schema_columns(table)       TEXT  JSON array of
                                     {name, type, notnull, pk}
  schema_indexes(table)       TEXT  JSON array of index names
  schema_to_sql(table)        TEXT  DDL for `table`
  explain_query_plan(sql)     TEXT  JSON tree from EXPLAIN
                                     QUERY PLAN
  db_utils_version()          TEXT
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
