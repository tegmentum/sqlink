[package]
name = "bpe-extension"
version = "0.1.0"
edition = "2021"
description = """
BPE tokenizer via tiktoken-rs. Bundles OpenAI's cl100k_base
encoding by default (the GPT-3.5/GPT-4 vocab); the model is
embedded in the wasm so callers don't need to ship a vocab
file out-of-band.

Functions:
  bpe_encode(text)          TEXT  JSON list of token IDs
  bpe_decode(ids_json)      TEXT  decoded text
  bpe_count_tokens(text)    INTEGER  token count
  bpe_model_name()          TEXT  the bundled encoding name
"""
license = "MIT"
publish = false

# NOTE: [workspace] removed so the cli's embed-bpe path dep can
# reach this crate from the parent workspace; same pattern as
# sha3-extension / crc-extension. `make ext NAME=bpe` still builds
# the wasi component fine. See PLAN-embed-extensions.md.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables src/embed.rs + the libsqlite3-sys + sqlite-embed deps so
# the cli can compile bpe's scalars in directly via
# sqlite3_create_function_v2. WIT component build is unaffected;
# default-off.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
tiktoken-rs = "0.7"
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
