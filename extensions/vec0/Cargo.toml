[package]
name = "vec0-extension"
version = "0.1.0"
edition = "2021"
description = """
vec0  wrapping kNN vtab over a regular source table. Sibling
to extensions/vec (the scalar surface). Designed for the
"already have a table of embeddings" pattern:

    CREATE TABLE docs(id INTEGER PRIMARY KEY, emb BLOB, label TEXT);
    INSERT INTO docs VALUES (1, vec_f32('[1,0,0]'), 'red'), ...;

    CREATE VIRTUAL TABLE knn USING vec0(
      source=docs,
      embedding_column=emb,
      metric=cosine    -- 'l2' (default), 'l1', or 'cosine'
    );

    SELECT rowid, distance FROM knn
    WHERE embedding MATCH vec_f32('[0.9,0.1,0]') AND k = 3;

vec0 reads from `source` via the host's spi.execute interface,
computes distances against the MATCH query vector, sorts, and
returns the top-k rows. Storage stays the user's responsibility
in a regular table; vec0 is a kNN-shaped view, not a separate
data store. Future ANN indexing (HNSW, IVF) can replace the
brute-force scan without changing the SQL surface.

Args (all optional except source / embedding_column):
  source            FROM table name
  rowid_column      defaults to 'rowid'
  embedding_column  vector BLOB column name
  metric            'l2' | 'l1' | 'cosine'  (default 'l2')
  index             'brute' (default) | 'ivf'
  n_partitions      IVF: number of k-means partitions; default
                    ceil(sqrt(N)) where N = source-table row count
  n_probes          IVF: number of nearest partitions to scan at
                    query time; default ceil(n_partitions / 16),
                    clamped to >= 1
  max_iter          IVF: Lloyd's algorithm cap; default 20

IVF builds the index lazily on the first kNN query and caches
it per-instance for the rest of the process lifetime. Rebuild
requires recreating the vtab  inserts to the source table
after the first query are invisible to the cached index.

**Requires a file-backed database.** vec0 calls back into the
host via `spi.execute` to scan the source table; the host's
spi connection is a separate sqlite3 instance from the cli's
in-wasm one and `:memory:` dbs can't be shared between the
two. Pass `--db PATH` to `sqlite-wasm-run`.

Tier-3 vtab port per PLAN-sqlite-plugins.md. Sibling to
sqlite-vec's vec0 in spirit, but trades dimension-enforcement-
at-INSERT for the wrapping shape that fits read-only vtabs
the cli already supports.
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
# Distance kernels + codec are inlined here (~50 LOC). Sharing
# them via a path-dep on `extensions/vec` failed because both
# sides emit the same `wit_bindgen::generate!`/`export!`
# symbols and rust-lld errored on duplicate
# `sqlite:extension/...` exports. The right long-term split is
# a `vec-core` lib crate without any wasm_export module, but
# that refactor is out of scope for vec0's first ship.
