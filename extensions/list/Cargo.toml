[package]
name = "list-extension"
version = "0.1.0"
edition = "2021"
description = """
JSON-array-backed list manipulation  array_append, array_prepend, array_cat / array_concat, array_length, array_position, array_remove, array_to_string, array_slice, array_sort, array_distinct, array_contains, array_reverse, flatten. Carrier shape is TEXT containing a JSON array (same encoding as SQLite's json1 builtin). unnest deferred  needs a vtab port.
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde_json = "1"
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-wasm/sqlite-embed", optional = true }
