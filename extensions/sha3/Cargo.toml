[package]
name = "sha3-extension"
version = "0.1.0"
edition = "2021"
description = """
SHA-3 (NIST FIPS 202) port of SQLite shathree
"""
license = "MIT"
publish = false

# NOTE: this crate used to declare [workspace] to stay standalone,
# but the cli's embed-sha3 path dep needs it inside the parent
# workspace. The wasi component build (`make ext NAME=sha3`) still
# works because it just runs `cargo build` from extensions/sha3
# with --manifest-path; cargo picks the parent workspace and
# builds this crate fine inside it.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enable the embed module: exposes `register_into(db: *mut sqlite3)`
# for the cli to call at startup when this extension is compiled
# in as a Rust dep instead of loaded as a wasi component.
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
sha3 = { version = "0.10", default-features = false }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
# Only pulled in when `embed` feature is on  the WIT-only build path
# never touches libsqlite3-sys.
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
# Shared FFI glue  generic thunk + arg/result conversions. Lets
# embed.rs be ~30 lines instead of ~150.
sqlite-embed = { path = "../../sqlite-embed", optional = true }
