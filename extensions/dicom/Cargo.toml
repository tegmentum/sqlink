[package]
name = "dicom-extension"
version = "0.1.0"
edition = "2021"
description = """
DICOM (Digital Imaging and Communications in Medicine) metadata
extraction from medical-imaging blobs. Pulls Patient Name / ID,
Study Date, Modality, Manufacturer, image dimensions, Transfer
Syntax UID, and arbitrary (group, element) tag values out of
DICOM Part 10 files.

Hand-rolled parser  the `dicom-rs` family (dicom-object 0.9) is a
large workspace whose async / network / image-codec dependencies
do not cross-compile cleanly to wasm32-wasip2 (see
PLAN-more-extensions hand-rolled pattern). DICOM Part 10 is a small
binary format: 128-byte preamble + "DICM" magic + Data Set of
(group, element, VR, length, value) tuples. We only need the
metadata tags  no pixel data, no decompression  so the parser
stays under 500 LOC.
"""
license = "MIT"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
