[package]
name = "emoji-extension"
version = "0.1.0"
edition = "2021"
description = """
Emoji detection / extraction / lookup over the full
Unicode 16 emoji table (the `emojis` crate):

    emoji_count(text)         INTEGER  number of emoji
    emoji_extract(text)       TEXT     JSON array of emojis
    emoji_strip(text)         TEXT     text with emoji removed
    emoji_from_shortcode(sc)  TEXT     ":sparkles:"  ""
    emoji_shortcode(emoji)    TEXT     ""  "sparkles" (GitHub)
    emoji_name(emoji)         TEXT     ""  "sparkles" (CLDR)
    emoji_group(emoji)        TEXT     emoji's group name
                                          ("smileys-emotion", ...)

Iterates grapheme clusters via `unicode-segmentation`
so ZWJ-joined emoji (family, professional skin-tone
variants) count as one unit. Useful for content
moderation, analytics, search-index normalization.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
embed = ["dep:libsqlite3-sys", "dep:sqlite-embed"]

[dependencies]
wit-bindgen = { version = "0.44", features = ["macros"] }
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
emojis = "0.8"
unicode-segmentation = "1"
serde_json = "1"
libsqlite3-sys = { version = "0.38", optional = true, default-features = false }
sqlite-embed = { path = "../../sqlite-embed", optional = true }
