# Cloud Build pipeline: build the container image + push to Artifact
# Registry + deploy to Cloud Run. Trigger via:
#
#   gcloud builds submit \
#       --config extensions-site/cloudbuild.yaml \
#       --substitutions _REGION=us-central1,_SERVICE=extensions-site
#
# Substitute REGION + SERVICE as needed.

substitutions:
  _REGION: us-central1
  _SERVICE: extensions-site
  _REPO: extensions  # Artifact Registry repo (create once: gcloud artifacts repositories create extensions ...)
  _PROJECT: ${PROJECT_ID}

steps:
  # ----- Build the image -----
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - extensions-site/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest
      - .

  # ----- Push to Artifact Registry -----
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args: ['push', '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:${SHORT_SHA}']
    waitFor: [build]
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: ['push', '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest']
    waitFor: [build]

  # ----- Deploy to Cloud Run -----
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --allow-unauthenticated     # public registry
      - --memory=256Mi              # tiny  the binary + 412 KB DB
      - --cpu=1
      - --min-instances=0           # scale to zero  registry traffic is bursty
      - --max-instances=10
      - --port=8080
      - --timeout=30s
      - --concurrency=80
    waitFor: [push-sha]

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest

options:
  machineType: E2_HIGHCPU_8         # rust release builds benefit
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s                       # 30 min cap (build is ~5 min)
