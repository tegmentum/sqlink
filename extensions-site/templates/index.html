<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQLink  SQLite extensions registry</title>
<meta name="description" content="Browse {{TOTAL_COUNT}} SQLite extensions ({{FN_COUNT}} SQL functions) compiled to WebAssembly. Loadable via .load EXT.wasm.">
<style>{{STYLE}}</style>
</head>
<body>
<header>
  <div class="container brand-row">
    <a class="brand" href="/" aria-label="SQLink home">
      <img class="logo" src="/static/sqlink_logo.png" alt="SQLink" width="180" height="80">
    </a>
    <div class="subtitle">{{TOTAL_COUNT}} SQLite extensions  {{FN_COUNT}} SQL functions, compiled to WebAssembly</div>
  </div>
</header>

<main class="container">
  <input type="search" class="search-bar" id="q" placeholder="Search by name, description, or category" autofocus>

  <div class="filter-row" id="filters"></div>
  <div class="filter-row" id="db-filters"></div>

  <div class="stats" id="stats">{{TOTAL_COUNT}} extensions  {{FN_COUNT}} functions</div>

  <div class="grid" id="results"></div>
</main>

<footer class="container">
  Generated from <code>provenance/extensions.db</code> at build time.<br>
  Source: <a href="https://github.com/anthropics/sqlite-wasm">github.com/anthropics/sqlite-wasm</a>
</footer>

<script id="data" type="application/json">{{DATA_JSON}}</script>
<script>
(function() {
  const data      = JSON.parse(document.getElementById('data').textContent);
  const q         = document.getElementById('q');
  const grid      = document.getElementById('results');
  const stats     = document.getElementById('stats');
  const filters   = document.getElementById('filters');
  const dbFilters = document.getElementById('db-filters');
  const activeTags = new Set();
  const activeDbs  = new Set();
  const allTags = [...new Set(data.flatMap(e => e.tags || []))].sort();
  // Preserve the DB chip order from the data so PG / MySQL / MariaDB / DuckDB / CH / SF-BQ stays consistent.
  const allDbs  = (() => {
    const seen = []; const set = new Set();
    for (const e of data) for (const d of (e.source_dbs || [])) if (!set.has(d)) { set.add(d); seen.push(d); }
    return seen;
  })();

  function renderFilters() {
    const chips = allTags.map(t => {
      const cls = activeTags.has(t) ? 'chip active' : 'chip';
      return '<button type="button" class="' + cls + '" data-tag="' + escapeHtml(t) + '">' +
             '<span class="tag tag-' + t.toLowerCase() + '">' + escapeHtml(t) + '</span></button>';
    }).join('');
    const clearCls = activeTags.size === 0 ? 'chip active' : 'chip';
    filters.innerHTML =
      '<span class="filter-label">Extension type:</span>' +
      '<button type="button" class="' + clearCls + '" data-tag="">All</button>' + chips;
  }

  function dbCss(name) { return name.toLowerCase().replace(/[\/ ]/g, '-'); }

  function renderDbFilters() {
    const chips = allDbs.map(d => {
      const cls = activeDbs.has(d) ? 'chip active' : 'chip';
      return '<button type="button" class="' + cls + '" data-db="' + escapeHtml(d) + '">' +
             '<span class="db db-' + dbCss(d) + '">' + escapeHtml(d) + '</span></button>';
    }).join('');
    const clearCls = activeDbs.size === 0 ? 'chip active' : 'chip';
    dbFilters.innerHTML =
      '<span class="filter-label">Source DB:</span>' +
      '<button type="button" class="' + clearCls + '" data-db="">All</button>' + chips;
  }

  function card(e) {
    const desc = (e.description || '').slice(0, 160);
    const fnLabel = e.exports_count === 1 ? 'function' : 'functions';
    const meta = e.exports_count + ' ' + fnLabel + '  v' + (e.version || '');
    const tagsHtml = (e.tags || [])
      .map(t => '<span class="tag tag-' + t.toLowerCase() + '">' + escapeHtml(t) + '</span>')
      .join('');
    const dbsHtml = (e.source_dbs || [])
      .map(d => '<span class="db db-' + dbCss(d) + '">' + escapeHtml(d) + '</span>')
      .join('');
    const preview = (e.exports_preview || []);
    const more = e.exports_count - preview.length;
    const fnsHtml = preview.length
      ? '<ul class="card-fns">' +
        preview.map(fn => '<li><code>' + escapeHtml(fn) + '</code></li>').join('') +
        (more > 0 ? '<li class="more">+ ' + more + ' more</li>' : '') +
        '</ul>'
      : '';
    return '<a class="card" href="/ext/' + encodeURIComponent(e.name) + '">' +
      '<h3>' + e.name + '</h3>' +
      '<div class="tags">' + tagsHtml + '</div>' +
      (dbsHtml ? '<div class="source-dbs">' + dbsHtml + '</div>' : '') +
      '<p class="desc">' + escapeHtml(desc) + '</p>' +
      fnsHtml +
      '<div class="meta">' + escapeHtml(meta) + '</div>' +
      '</a>';
  }
  function matches(e, query) {
    if (activeTags.size > 0) {
      const tags = e.tags || [];
      if (!tags.some(t => activeTags.has(t))) return false;
    }
    if (activeDbs.size > 0) {
      const dbs = e.source_dbs || [];
      if (!dbs.some(d => activeDbs.has(d))) return false;
    }
    if (!query) return true;
    const blob = (e.name + ' ' + (e.description||'') + ' ' + (e.track||'') + ' ' +
                  (e.categories || []).join(' ') + ' ' +
                  (e.keywords || []).join(' ') + ' ' +
                  (e.tags || []).join(' ') + ' ' +
                  (e.source_dbs || []).join(' ')).toLowerCase();
    return blob.includes(query);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function render() {
    const query = q.value.trim().toLowerCase();
    const filtered = data.filter(e => matches(e, query));
    grid.innerHTML = filtered.map(card).join('');
    stats.textContent = filtered.length + ' of ' + data.length + ' extensions' +
      (query ? '  matching "' + query + '"' : '');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">No matches.</div>';
    }
  }

  q.addEventListener('input', render);
  filters.addEventListener('click', function(ev) {
    const btn = ev.target.closest('button.chip');
    if (!btn) return;
    const tag = btn.dataset.tag;
    if (!tag) {
      activeTags.clear();
    } else if (activeTags.has(tag)) {
      activeTags.delete(tag);
    } else {
      activeTags.add(tag);
    }
    renderFilters();
    render();
  });
  dbFilters.addEventListener('click', function(ev) {
    const btn = ev.target.closest('button.chip');
    if (!btn) return;
    const db = btn.dataset.db;
    if (!db) {
      activeDbs.clear();
    } else if (activeDbs.has(db)) {
      activeDbs.delete(db);
    } else {
      activeDbs.add(db);
    }
    renderDbFilters();
    render();
  });
  renderFilters();
  renderDbFilters();
  render();
})();
</script>
</body>
</html>
