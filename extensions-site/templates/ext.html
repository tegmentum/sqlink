<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{NAME}}  SQLink</title>
<meta name="description" content="{{DESC_META}}">
<style>{{STYLE}}</style>
</head>
<body>
<header>
  <div class="container brand-row">
    <a class="brand" href="/" aria-label="SQLink home">
      <img class="logo" src="/static/sqlink_logo.png" alt="SQLink" width="180" height="80">
    </a>
    <div class="subtitle"><a href="/" style="color:#666;text-decoration:none;"> back to all</a></div>
  </div>
</header>

<main class="container detail">
  <h2>{{NAME}}</h2>
  <div class="tags">{{TAGS_HTML}}</div>
  <p class="lede">{{DESCRIPTION}}</p>

  {{ACTIONS}}

  <div class="section">
    <h3>Details</h3>
    <dl class="detail-grid">{{DETAIL_ROWS}}</dl>
  </div>

  {{EXPORTS_SECTION}}

  {{DEPS_SECTION}}

  {{REASON_SECTION}}
</main>

<footer class="container">
  <a href="/">All extensions</a>
  <a href="/api/ext/{{NAME}}.json">JSON</a>
</footer>
</body>
</html>
