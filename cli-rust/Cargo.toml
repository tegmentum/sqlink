[package]
name = "sqlite-cli-rust"
version = "0.1.0"
edition = "2021"
publish = false
description = "Reactor-shape Rust port of the SQLite CLI. Targets the sqlite-cli-reactor world; async-stackful lifts (needed for spi.execute re-entry) are this crate's reason for existing."

[lib]
crate-type = ["cdylib"]

[dependencies]
# wit-bindgen-rt provides the runtime support functions the
# generate! macro emits calls to. The `async` feature is
# required for async-lowered host imports.
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags", "async"] }
# Stage 2b: replaces cargo-component's auto-generated bindings
# so we can pass `async: true` (cargo-component 0.21 doesn't
# expose this knob). Bindings are produced inline in src/lib.rs.
wit-bindgen = { version = "0.44", features = ["macros"] }
# libsqlite3-sys provides raw FFI to sqlite3.c (bundled compiles
# it via the cc crate against wasm32-wasip1; needs
# CC_wasm32_wasip1 = wasi-sdk clang). We use it directly via the
# in-tree `db` module instead of going through rusqlite —
# rusqlite's sync-callback Fn registration API fights cli-rust's
# async wit-bindgen import surface (see SPI-LIVE.md).
libsqlite3-sys = { version = "0.30", features = ["bundled"] }

# Component packaging: after `cargo build --release --target
# wasm32-wasip1`, run
#   wasm-tools component new \
#     target/wasm32-wasip1/release/sqlite_cli_rust.wasm \
#     --adapt wasi_snapshot_preview1.reactor.wasm \
#     -o target/wasm32-wasip1/release/sqlite_cli_rust.component.wasm
