[build]
target = "wasm32-wasip2"

[target.wasm32-wasip2]
linker = "rust-lld"
rustflags = ["-C", "link-arg=--no-entry"]

# Bundled libsqlite3-sys's build script wants a C compiler that
# targets wasm32-wasip2. Point at our wasi-sdk install (same
# version the other crates use).
[env]
CC_wasm32_wasip2 = "/Users/zacharywhitley/wasi-sdk/bin/clang"
AR_wasm32_wasip2 = "/Users/zacharywhitley/wasi-sdk/bin/ar"
CFLAGS_wasm32_wasip2 = "--sysroot=/Users/zacharywhitley/wasi-sdk/share/wasi-sysroot -target wasm32-wasip2"
