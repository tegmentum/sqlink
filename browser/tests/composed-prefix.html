<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sqlink browser — composed cli + .prefix dot-cmd round-trip</title>
  </head>
  <body>
    <pre id="status">running...</pre>
    <pre id="out"></pre>
    <script type="module">
      // #479 follow-up. Drives the composed cli's `.prefix add /
      // list / expansion / delete` dot-cmds via ComposedDatabase's
      // execDotCommand pipe. prefix-cli is baked into the composed
      // cli via include_bytes! in cli/src/lib.rs.

      import { openDatabaseComposed } from '../src/sqlink-composed.js'

      const status = document.getElementById('status')
      const out = document.getElementById('out')
      const log = (line) => {
        out.textContent += line + '\n'
      }

      try {
        const db = await openDatabaseComposed({})
        log('opened composed db; prefix-cli auto-loaded')

        const addOut = await db.execDotCommand(
          '.prefix add foaf http://xmlns.com/foaf/0.1/',
        )
        log('add: ' + JSON.stringify(addOut))

        const listOut = await db.execDotCommand('.prefix list')
        log('list: ' + JSON.stringify(listOut))

        const expansionOut = await db.execDotCommand('.prefix expansion foaf')
        log('expansion: ' + JSON.stringify(expansionOut))

        const deleteOut = await db.execDotCommand('.prefix delete foaf')
        log('delete: ' + JSON.stringify(deleteOut))

        const listAfterDelete = await db.execDotCommand('.prefix list')
        log('list-after-delete: ' + JSON.stringify(listAfterDelete))

        status.textContent = 'done'
        window.__prefixResult = {
          addOut,
          listOut,
          expansionOut,
          deleteOut,
          listAfterDelete,
        }
      } catch (e) {
        status.textContent = 'error: ' + (e?.stack ?? String(e))
        log(String(e?.stack ?? e))
        window.__prefixResult = { error: String(e?.stack ?? e) }
      } finally {
        window.__prefixDone = true
      }
    </script>
  </body>
</html>
