<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sqlink browser — composed cli + prefix-cli substrate probe</title>
  </head>
  <body>
    <pre id="status">running...</pre>
    <pre id="out"></pre>
    <script type="module">
      // v1 substrate probe.
      //
      // The browser composed-cli does not have a dot-command
      // dispatcher in v1 (see browser/src/extension-loader.js
      // dispatch_dot_command returns 404). So we can't exercise
      // `.prefix list / add / functions / delete` end-to-end here
      // yet. What we CAN verify in v1:
      //
      //   - prefix_cli transpiled cleanly (jco transpile produced
      //     the generated/prefix_cli/ artifacts).
      //   - All prefix_cli's WIT imports (spi, types, dot-command,
      //     etc.) are satisfied by sqlite-lib's browser stubs —
      //     module instantiation in any reasonable harness wouldn't
      //     blow up at import-resolution time.
      //
      // Once browser dispatch_dot_command lands, this harness can
      // drive the prefix dot-commands through the transpiled module
      // and assert the metadata round-trip; today, the import-OK
      // signal is the substrate guarantee.
      const status = document.getElementById('status')
      const out = document.getElementById('out')
      const log = (line) => {
        out.textContent += line + '\n'
      }

      try {
        const mod = await import(
          '../src/generated/prefix_cli/prefix_cli_extension.js'
        )
        log('prefix_cli module imported OK')
        const exportedNames = Object.keys(mod).sort()
        log('exports -> ' + JSON.stringify(exportedNames))
        const hasInstantiate = typeof mod.instantiate === 'function'
        log('has instantiate() -> ' + hasInstantiate)
        status.textContent = 'done'
        window.__prefixResult = {
          imported: true,
          exports: exportedNames,
          hasInstantiate,
          // v1: dot-command driver missing; document the gap so the
          // spec can skip the end-to-end assertions with a clear
          // reason. Shared blocker with composed-bundle.spec.js.
          dotCommandDriverGap: true,
        }
      } catch (e) {
        status.textContent = 'error: ' + (e?.stack ?? String(e))
        log(String(e?.stack ?? e))
        window.__prefixResult = { error: String(e?.stack ?? e) }
      } finally {
        window.__prefixDone = true
      }
    </script>
  </body>
</html>
