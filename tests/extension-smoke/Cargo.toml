[package]
name = "extension-smoke"
version = "0.0.0"
edition = "2021"
publish = false
description = """
Per-extension smoke matrix for sqlink scenario 2 (the standalone
SQLite-in-wasm + cli + loader path). Each extension's
`.component.wasm` is loaded via `sqlink --db ... cli.component.wasm`
and exercised with a small fixed SQL probe; output is compared
against an expected pattern.

Task #395 in the release-readiness sequence. The fixture data
this crate carries (tests/extension-smoke/fixtures.toml) is the
reusable input that scenarios 1 (native loader) and 3 (browser
runtime) will eventually run the same assertions against.
"""

[lib]
path = "src/lib.rs"

[[test]]
name = "extension_smoke"
path = "src/test.rs"

[[test]]
# Scenario 1 (native loader) variant. Same fixtures.toml, but
# routes every probe through `sqlink-native` instead of `sqlink`
# + the wasm cli component.
name = "extension_smoke_native"
path = "src/test_native.rs"

[[test]]
# Scenario 1 sub-option (loader .so) variant. Drives every probe
# through a vanilla `sqlite3` shell + the sqlink-loader .so/.dylib.
# Auto-SKIPs every fixture when either the .so or a usable
# sqlite3 (one with load_extension enabled) is missing  CI runs
# stay cheap in cold configurations.
name = "extension_smoke_loader"
path = "src/test_loader.rs"

[[test]]
# Native mirror of browser/tests/composed-wal-hook.spec.js. One
# #[test] per deployment path (sqlink-native + sqlink+wasm-cli);
# both load hookprobe, toggle journal_mode=WAL on a file-backed
# db, INSERT a few rows, and assert the extension's drain-log
# carries at least one `wal:42:main:<n>` event proving the WAL-
# hook substrate fired end-to-end.
name = "extension_smoke_wal_hook"
path = "src/test_wal_hook.rs"

[[test]]
# Substrate-companion to test_wal_hook (#438). Exercises the
# wal-frames host SPI dispatcher (get-wal-header + read-frames)
# AND the existing spi.serialize-db, all wired through the
# capability-gated wal-frames + spi grants. Asserts WAL magic
# in get-wal-header(), correct frame size in read-frames(1,1),
# and "SQLite format 3\0" magic in serialize-db(). Substrate
# for PLAN-wal-archive-extension.md (#439).
name = "extension_smoke_wal_frames"
path = "src/test_wal_frames.rs"

[[test]]
# Substrate-companion to test_wal_frames (#439). Spins up a
# local mock S3 server (s3s-fs, filesystem-backed) on an
# ephemeral port, then drives the hookprobe extension's s3-base
# probes (s3_put / s3_get / s3_list / s3_delete) end-to-end to
# verify the host's s3-base SPI bridge round-trips through the
# capability-gated grant. Substrate for PLAN-wal-archive-
# extension.md (#440).
name = "extension_smoke_s3_base"
path = "src/test_s3_base.rs"

[[test]]
# End-to-end consumer of the four substrates above (#438 wal-hook
# wiring, #439 wal-frames SPI, #440 s3-base SPI, #441 cached
# Store unification). Loads the wal-archive extension against
# the same s3s-fs mock S3 server test_s3_base uses, drives
# wal_archive_start  INSERTs  wal_archive_snapshot_now
# more INSERTs  wal_archive_stop, then in a fresh process
# wal_archive_restore to a new path and verifies all rows
# replayed. Two scenarios (sqlink-native + sqlink+wasm-cli)
# x three tests (smoke / snapshot / round-trip).
name = "extension_smoke_wal_archive"
path = "src/test_wal_archive.rs"

[[bin]]
name = "extension-smoke-report"
path = "src/report.rs"

[dependencies]
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
once_cell = "1"

[dev-dependencies]
# Mock S3 server for the s3-base substrate test (#440). s3s +
# s3s-fs spin up a file-system-backed S3-compatible HTTP server
# that accepts SigV4-signed requests on an ephemeral port, so the
# test can exercise the host's reqwest+aws-sigv4 bridge without
# touching a real AWS account.
s3s = "0.14"
s3s-fs = "0.14"
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["server-auto", "tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
tempfile = "3"
