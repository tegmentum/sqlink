[build]
target = "wasm32-wasip2"

[target.wasm32-wasip2]
linker = "rust-lld"
rustflags = ["-C", "link-arg=--no-entry"]

# CC_wasm32_wasip2 / AR_wasm32_wasip2 / LIBSQLITE3_FLAGS are read
# from the workspace root's .cargo/config.toml (cargo walks up
# the directory tree for config). That's where the wasi-sdk paths
# live  this crate inherits them unchanged.
